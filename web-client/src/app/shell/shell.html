<mat-sidenav-container class="shell-container">

  <mat-sidenav #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    class="sidenav">

    <div class="sidenav-header">
      <mat-icon class="logo-icon">computer</mat-icon>
      <span class="logo-text">Remote PC</span>
    </div>

    <div class="status-row">
      <span class="status-dot" [class.online]="agentConnected" [class.offline]="!agentConnected"></span>
      <span class="status-label">{{ agentConnected ? 'PC Online' : 'PC Offline' }}</span>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      <a mat-list-item
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-spacer"></div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      <a mat-list-item (click)="logout()" class="logout-item">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="content-area">
    <mat-toolbar class="top-bar">
      <button mat-icon-button (click)="sidenav.toggle()" *ngIf="isMobile">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ pageTitle }}</span>
      <span class="toolbar-spacer"></span>
      <span class="status-chip" [class.online]="agentConnected" [class.offline]="!agentConnected">
        <mat-icon>{{ agentConnected ? 'check_circle' : 'cancel' }}</mat-icon>
        {{ agentConnected ? 'Online' : 'Offline' }}
      </span>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
